name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: '.exe' }
          - { goos: windows, goarch: arm64, ext: '.exe' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          out="ssd-test-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "$out" .
          sha256sum "$out" > "${out}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ssd-test-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ssd-test-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            ssd-test-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Combine SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256
          ls -la
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
